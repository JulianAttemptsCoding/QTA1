    family: llama3_2
    enabled: false
    requires_hf_token: true
    cutoff: "December 2023"
    cutoff_source: "https://huggingface.co/meta-llama/Llama-3.2-3B-Instruct"
    cutoff_note: "Excluded at G0 because the supplied HF token was not authorized for this gated repo."
  - id: google/gemma-2-2b-it
    family: gemma2
    enabled: false
    requires_hf_token: true
    cutoff: "not documented on Google Gemma 2 model card"
    cutoff_source: "https://ai.google.dev/gemma/docs/core/model_card_2"
    cutoff_note: "Excluded with the gated pair at G0 because P-05 requires accepted gated licenses before adding Llama/Gemma."
sampling:
