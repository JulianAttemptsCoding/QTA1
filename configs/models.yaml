# Candidate open-weight agent models. Cutoff metadata was checked at G0 from the
# linked model cards/docs; C-2 contamination probes remain the operative exclusion
# test where exact public-data cutoffs are not documented.
# T4 (16 GB) fit: prefer <= 4B params or 4-bit quants of 7-8B.
models:
  - id: Qwen/Qwen2.5-1.5B-Instruct
    family: qwen2_5
    requires_hf_token: false
    cutoff: "not documented on model card; Qwen2.5 release/citation month September 2024"
    cutoff_source: "https://huggingface.co/Qwen/Qwen2.5-3B-Instruct"
    cutoff_note: "Admitted provisionally because release precedes OOS selection date 2024-12-20; C-2 probes decide exclusions."
  - id: Qwen/Qwen2.5-3B-Instruct
    family: qwen2_5
    requires_hf_token: false
    cutoff: "not documented on model card; Qwen2.5 release/citation month September 2024"
    cutoff_source: "https://huggingface.co/Qwen/Qwen2.5-3B-Instruct"
    cutoff_note: "Admitted provisionally because release precedes OOS selection date 2024-12-20; C-2 probes decide exclusions."
  - id: microsoft/Phi-3.5-mini-instruct
    family: phi3_5
    requires_hf_token: false
    cutoff: "October 2023 for publicly available data"
    cutoff_source: "https://huggingface.co/microsoft/Phi-3.5-mini-instruct"
  - id: HuggingFaceTB/SmolLM2-1.7B-Instruct
    family: smollm2
    requires_hf_token: false
    cutoff: "not documented on model card"
